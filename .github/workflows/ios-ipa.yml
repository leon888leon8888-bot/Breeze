name: iOS IPA Test Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ios-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Set up Flutter with FVM
        run: |
          dart pub global activate fvm
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          export PATH="$PATH:$HOME/.pub-cache/bin"
          fvm install
          fvm use --force
          echo "$GITHUB_WORKSPACE/.fvm/flutter_sdk/bin" >> "$GITHUB_PATH"

      - name: Install Rust for iOS
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust

      - name: Set up Node and pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build unsigned iOS app
        run: |
          fvm flutter precache --ios
          fvm flutter pub get
          sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' ios/Runner.xcodeproj/project.pbxproj
          fvm flutter build ios --release --no-codesign --split-debug-info=build/symbols

      - name: Package IPA
        run: |
          rm -rf Payload LumaShelf-iOS.ipa
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          /usr/bin/zip -r LumaShelf-iOS.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: lumashelf-ios-ipa
          path: LumaShelf-iOS.ipa
